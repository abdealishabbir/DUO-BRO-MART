services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: duobromart
      POSTGRES_USER: duobromart
      POSTGRES_PASSWORD: duobromart
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  backend:
    build: ./backend
    command: sh -c "if [ \"$${DJANGO_DEBUG}\" = 'True' ]; then python manage.py runserver 0.0.0.0:8000; else daphne -b 0.0.0.0 -p 8000 config.asgi:application; fi"
    working_dir: /app
    environment:
      DJANGO_DEBUG: "${DJANGO_DEBUG:-True}"
      DJANGO_SECRET_KEY: "${DJANGO_SECRET_KEY:-development-only-change-before-deploying}"
      DJANGO_ALLOWED_HOSTS: "${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}"
      CSRF_TRUSTED_ORIGINS: "${CSRF_TRUSTED_ORIGINS:-}"
      POSTGRES_HOST: "${POSTGRES_HOST:-postgres}"
      POSTGRES_DB: "${POSTGRES_DB:-duobromart}"
      POSTGRES_USER: "${POSTGRES_USER:-duobromart}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-duobromart}"
      POSTGRES_PORT: "${POSTGRES_PORT:-5432}"
      REDIS_URL: "${REDIS_URL:-redis://redis:6379/1}"
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}"
      FRONTEND_URL: "${FRONTEND_URL:-http://127.0.0.1:5173}"
      REQUIRE_EMAIL_VERIFICATION: "${REQUIRE_EMAIL_VERIFICATION:-True}"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
      - redis
volumes:
  postgres_data:
