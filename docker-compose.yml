services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: duobromart
      POSTGRES_USER: duobromart
      POSTGRES_PASSWORD: duobromart
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  backend:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    working_dir: /app
    environment:
      DJANGO_DEBUG: "True"
      DJANGO_SECRET_KEY: development-only-change-before-deploying
      POSTGRES_HOST: postgres
      POSTGRES_DB: duobromart
      POSTGRES_USER: duobromart
      POSTGRES_PASSWORD: duobromart
      # The Vite server is available through either address during local testing.
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      FRONTEND_URL: http://127.0.0.1:5173
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
      - redis
volumes:
  postgres_data:
